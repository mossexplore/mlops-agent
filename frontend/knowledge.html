<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wise MLOps Knowledge</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/knowledge.css" />
  </head>
  <body>
    <div class="app-background" aria-hidden="true"></div>
    <main class="knowledge-shell">
      <aside class="knowledge-side">
        <header class="brand">
          <div class="brand-mark">W</div>
          <div>
            <h1>Wise MLOps Agent</h1>
            <p>Local Markdown Knowledge</p>
          </div>
        </header>
        <nav class="nav-links">
          <a href="/">诊断会话</a>
          <a href="/knowledge" class="active">知识库</a>
          <a href="/runbooks">Runbook</a>
          <a href="/ops">运营看板</a>
          <a href="/quality">质量闭环</a>
          <button id="logoutButton" class="nav-logout" type="button">退出</button>
        </nav>
        <section class="knowledge-list-panel">
          <div class="panel-title">
            <span>知识文件</span>
            <button id="refreshKnowledge" class="ghost-button" type="button">刷新</button>
          </div>
          <div id="knowledgeList" class="knowledge-list"></div>
        </section>
      </aside>

      <section class="knowledge-workspace">
        <header class="knowledge-hero">
          <div>
            <p>Skill: local_markdown_knowledge</p>
            <h2>本地 Markdown 知识库管理</h2>
          </div>
          <div class="status-strip">
            <span>Lifecycle</span>
            <span>Metadata</span>
            <span>Published RAG</span>
          </div>
        </header>

        <section class="knowledge-grid">
          <form id="knowledgeForm" class="knowledge-editor">
            <div class="document-toolbar">
              <div class="document-title-block">
                <p id="knowledgeMode">新增 / 更新知识</p>
                <h3 id="documentHeading">知识内容与治理元数据</h3>
                <div id="documentMetaLine" class="document-meta-line">选择左侧知识或新建一条知识</div>
              </div>
              <div class="editor-actions">
                <button id="newKnowledge" class="secondary-button" type="button">新建</button>
                <button id="saveKnowledge" type="submit">保存</button>
              </div>
            </div>

            <label>
              标题
              <input id="knowledgeTitle" placeholder="例如：登录失败排查" required />
            </label>
            <label>
              文件名
              <input id="knowledgeFilename" placeholder="例如：login-troubleshooting.md，可留空" />
            </label>
            <label class="content-field">
              Markdown 内容
              <textarea id="knowledgeContent" placeholder="# 登录问题&#10;&#10;## 登录失败排查&#10;1. 检查账号状态..." required></textarea>
            </label>
          </form>

          <section class="knowledge-insights">
            <section class="knowledge-search-panel governance-panel">
              <div class="editor-head">
                <div>
                  <p>属性与工作流</p>
                  <h3>发布前治理信息</h3>
                </div>
              </div>
              <section class="workflow-bar" aria-label="知识状态流转">
                <div>
                  <span class="workflow-caption">当前状态</span>
                  <strong id="currentStatusLabel">已发布</strong>
                </div>
                <div id="lifecycleActions" class="lifecycle-actions">
                  <button type="button" data-status-action="draft">转草稿</button>
                  <button type="button" data-status-action="review">提交审核</button>
                  <button type="button" data-status-action="published">发布</button>
                  <button type="button" data-status-action="archived">归档</button>
                </div>
              </section>
              <dl id="governanceSummary" class="governance-summary">
                <div>
                  <dt>当前文件</dt>
                  <dd data-summary="filename">未选择</dd>
                </div>
                <div>
                  <dt>分类</dt>
                  <dd data-summary="category">未分类</dd>
                </div>
                <div>
                  <dt>标签</dt>
                  <dd data-summary="tags">无标签</dd>
                </div>
                <div>
                  <dt>更新时间</dt>
                  <dd data-summary="updatedAt">未记录</dd>
                </div>
              </dl>
              <div class="metadata-grid">
                <label>
                  分类
                  <input id="knowledgeCategory" placeholder="例如：登录认证 / 资源问题" />
                </label>
                <label>
                  标签
                  <input id="knowledgeTags" placeholder="逗号分隔，例如：SSO,登录,FAQ" />
                </label>
                <label>
                  状态
                  <select id="knowledgeStatus">
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                    <option value="review">待审核</option>
                    <option value="archived">已归档</option>
                  </select>
                </label>
                <label>
                  可见性
                  <select id="knowledgeVisibility">
                    <option value="internal">内部</option>
                    <option value="private">私有</option>
                    <option value="public">公开</option>
                  </select>
                </label>
                <label>
                  负责人
                  <input id="knowledgeOwner" placeholder="例如：平台运维 / jack" />
                </label>
                <label>
                  审核备注
                  <input id="knowledgeReviewNotes" placeholder="说明变更、审核意见或归档原因" />
                </label>
              </div>
            </section>

            <section class="knowledge-search-panel knowledge-tabs-panel">
              <div class="knowledge-tabs" role="tablist" aria-label="知识洞察">
                <button class="active" type="button" data-tab="search">检索</button>
                <button type="button" data-tab="revisions">版本</button>
                <button type="button" data-tab="gaps">缺口</button>
              </div>
              <div class="tab-pane active" data-pane="search">
                <form id="knowledgeSearchForm" class="knowledge-search">
                  <input id="knowledgeQuery" placeholder="输入问题，例如：登录失败怎么处理" />
                  <button type="submit">检索</button>
                </form>
                <div id="knowledgeResults" class="knowledge-results"></div>
              </div>
              <div class="tab-pane" data-pane="revisions">
                <div id="knowledgeRevisions" class="knowledge-results"></div>
              </div>
              <div class="tab-pane" data-pane="gaps">
                <div id="knowledgeGaps" class="knowledge-results"></div>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>
    <div id="knowledgeToast" class="knowledge-toast" role="status" aria-live="polite"></div>
    <script src="/static/session.js"></script>
    <script src="/static/knowledge.js"></script>
  </body>
</html>
