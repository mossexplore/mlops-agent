<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wise MLOps Quality</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/quality.css" />
  </head>
  <body>
    <div class="app-background" aria-hidden="true"></div>
    <main class="quality-shell">
      <aside class="quality-side">
        <header class="brand">
          <div class="brand-mark">W</div>
          <div>
            <h1>Wise MLOps Agent</h1>
            <p>Quality Feedback Loop</p>
          </div>
        </header>
        <nav class="nav-links">
          <a href="/">诊断会话</a>
          <a href="/knowledge">知识库</a>
          <a href="/runbooks">Runbook</a>
          <a href="/ops">运营看板</a>
          <a href="/quality" class="active">质量闭环</a>
          <button id="logoutButton" class="nav-logout" type="button">退出</button>
        </nav>

        <section class="quality-card compact">
          <div class="panel-title">
            <span>质量原因</span>
            <button id="refreshQuality" class="ghost-button" type="button">刷新</button>
          </div>
          <div class="reason-legend">
            <span>知识缺失</span>
            <span>检索错误</span>
            <span>回答泛泛</span>
            <span>步骤不可执行</span>
            <span>误判场景</span>
          </div>
        </section>
      </aside>

      <section class="quality-workspace">
        <header class="quality-hero">
          <div>
            <p>Dataset · Eval · Experiment</p>
            <h2>质量评估与反馈闭环</h2>
          </div>
          <div class="status-strip">
            <span>Feedback</span>
            <span>Eval Set</span>
            <span>A/B</span>
          </div>
        </header>

        <section class="quality-content">
          <section id="qualityMetrics" class="quality-metrics"></section>

          <section class="quality-grid">
            <article class="quality-card feedback-workbench">
              <div class="section-head">
                <div>
                  <p>Annotation Queue</p>
                  <h3>点踩反馈工作台</h3>
                </div>
              </div>
              <div id="feedbackQueue" class="feedback-queue"></div>
            </article>

            <article class="quality-card">
              <div class="section-head">
                <div>
                  <p>Golden Dataset</p>
                  <h3>评测集沉淀</h3>
                </div>
                <button id="saveEvalCase" class="primary-action" type="button">保存用例</button>
              </div>
              <div class="eval-form">
                <input id="caseTitle" placeholder="用例标题，例如：OOM 资源不足诊断" />
                <textarea id="caseQuery" rows="3" placeholder="输入问题"></textarea>
                <textarea id="caseExpected" rows="3" placeholder="期望答案或评判说明"></textarea>
                <input id="caseRequired" placeholder="必须包含步骤，逗号分隔" />
                <input id="caseForbidden" placeholder="禁止出现内容，逗号分隔" />
                <input id="caseTags" placeholder="标签，逗号分隔" />
              </div>
              <div id="evalCases" class="eval-list"></div>
            </article>
          </section>

          <section class="quality-grid lower">
            <article class="quality-card">
              <div class="section-head">
                <div>
                  <p>Regression Eval</p>
                  <h3>自动评测</h3>
                </div>
                <button id="runEval" class="primary-action" type="button">运行评测</button>
              </div>
              <div class="eval-run-form">
                <input id="evalRunName" value="baseline quality run" />
                <input id="evalVariant" value="baseline" />
                <input id="evalPromptVersion" placeholder="prompt 版本，例如：diagnostic-v1" />
              </div>
              <div id="evalRuns" class="eval-runs"></div>
            </article>

            <article class="quality-card">
              <div class="section-head">
                <div>
                  <p>Experiment Design</p>
                  <h3>A/B 实验</h3>
                </div>
                <button id="saveExperiment" class="primary-action" type="button">保存实验</button>
              </div>
              <div class="experiment-form">
                <input id="experimentName" placeholder="实验名称，例如：检索阈值对比" />
                <input id="experimentVariants" placeholder="variants，例如：baseline,high-recall" />
                <input id="experimentSplit" placeholder="流量比例，例如：baseline:0.5,high-recall:0.5" />
                <select id="experimentMetric">
                  <option value="satisfactionRate">满意率</option>
                  <option value="unlikeRate">点踩率</option>
                  <option value="knowledgeHitRate">知识命中率</option>
                  <option value="avgScore">评测平均分</option>
                </select>
              </div>
              <div id="experiments" class="experiment-list"></div>
            </article>
          </section>
        </section>
      </section>
    </main>
    <div id="qualityToast" class="quality-toast" role="status" aria-live="polite"></div>
    <script src="/static/session.js"></script>
    <script src="/static/quality.js"></script>
  </body>
</html>
