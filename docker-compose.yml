services:
  wise-mlops-agent:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./skills/local_markdown_knowledge/knowledge:/app/skills/local_markdown_knowledge/knowledge
      - ./skills/local_markdown_knowledge/indexes:/app/skills/local_markdown_knowledge/indexes
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
